workflows:
  android-debug-build:
    name: Latchi IPTV VIP Debug APK
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      java: 17

    scripts:
      - name: Show root files
        script: |
          pwd
          ls -la
          echo "---app structure---"
          ls -la app/

      - name: Verify Gradle wrapper
        script: |
          if [ ! -f "./gradlew" ]; then
            echo "ERROR: gradlew not found"
            exit 1
          fi
          echo "✓ Gradle wrapper found"

      - name: Clean local machine files
        script: |
          rm -f local.properties
          rm -rf .idea
          rm -rf app/release

      - name: Make Gradle executable
        script: |
          chmod +x ./gradlew

      - name: Init OTA version
        script: |
          BUILD_VERSION_CODE="${BUILD_VERSION_CODE:-$(date +%s)}"
          BUILD_VERSION_NAME="${BUILD_VERSION_NAME:-2.1.1.$BUILD_VERSION_CODE}"
          echo "BUILD_VERSION_CODE=$BUILD_VERSION_CODE" >> "$CM_ENV"
          echo "BUILD_VERSION_NAME=$BUILD_VERSION_NAME" >> "$CM_ENV"
          echo "OTA versionCode=$BUILD_VERSION_CODE"
          echo "OTA versionName=$BUILD_VERSION_NAME"

      - name: Build Debug APK
        script: |
          attempt=1
          max=3
          while true; do
            echo "===== Build attempt $attempt ====="
            set -o pipefail
            ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build_log.txt
            status=$?
            set +o pipefail
            if [ "$status" -eq 0 ]; then
              echo "Build succeeded"
              break
            fi
            if grep -qiE "Read timed out|Could not (GET|download)|connection reset|Network is unreachable|Could not resolve" build_log.txt \
               && ! grep -qiE "compileDebugKotlin FAILED|compileDebugJavaWithJavac FAILED|Compilation error|^e: " build_log.txt \
               && [ "$attempt" -lt "$max" ]; then
              echo "Network issue detected. Retrying in 20s..."
              attempt=$((attempt+1))
              sleep 20
              continue
            fi
            echo "Build failed due to a real error (see log above). Stopping."
            exit 1
          done

      - name: Verify APK exists
        script: |
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK produced — build did not actually succeed."
            exit 1
          fi
          echo "APK found: $APK"
          mkdir -p "$CM_BUILD_DIR/artifacts"
          cp "$APK" "$CM_BUILD_DIR/artifacts/app-debug.apk"
          ls -la "$CM_BUILD_DIR/artifacts"

      - name: Publish OTA to GitHub Releases and Google Script
        script: |
          set -e
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN is not set. Skipping OTA publish."
            exit 0
          fi

          OWNER="${UPDATE_REPO_OWNER:-iskande233}"
          REPO="${UPDATE_REPO:-latchi-iptv-updates}"
          GOOGLE_SCRIPT_URL="${GOOGLE_SCRIPT_URL:-https://script.google.com/macros/s/AKfycbxThygspXN6eB8cDUfY7XavKmhXZfewEUfQqd3vARScZ5y7adterInsbXshNkgPgfiF/exec}"
          ADMIN_SECRET="${ADMIN_SECRET:-LatchiAdmin2026}"
          FORCE_UPDATE="${FORCE_UPDATE:-false}"
          NOTES_AR="${NOTES_AR:-تحديث جديد من LATCHI IPTV عبر GitHub Releases.}"

          APK="$CM_BUILD_DIR/artifacts/app-debug.apk"
          if [ ! -f "$APK" ]; then
            APK=$(find app/build/outputs -name "*.apk" | head -1)
          fi
          if [ ! -f "$APK" ]; then
            echo "No APK found for OTA publish"
            exit 1
          fi

          TAG="v${BUILD_VERSION_CODE}"
          ASSET="latchi-iptv-${BUILD_VERSION_CODE}.apk"
          API="https://api.github.com/repos/$OWNER/$REPO"
          AUTH="Authorization: Bearer $GITHUB_TOKEN"
          export TAG BUILD_VERSION_NAME NOTES_AR GOOGLE_SCRIPT_URL ADMIN_SECRET BUILD_VERSION_CODE FORCE_UPDATE

          echo "Creating or reading GitHub Release $OWNER/$REPO $TAG"
          RELEASE_JSON=$(curl -sS -H "$AUTH" -H "Accept: application/vnd.github+json" "$API/releases/tags/$TAG" || true)
          if ! echo "$RELEASE_JSON" | grep -q '"upload_url"'; then
            RELEASE_PAYLOAD=$(python3 -c 'import json,os; print(json.dumps({"tag_name":os.environ["TAG"],"name":"LATCHI IPTV "+os.environ.get("BUILD_VERSION_NAME",os.environ["TAG"]),"body":os.environ.get("NOTES_AR","LATCHI IPTV update"),"draft":False,"prerelease":False}))')
            RELEASE_JSON=$(curl -sS -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" -d "$RELEASE_PAYLOAD" "$API/releases")
          fi

          UPLOAD_URL=$(RELEASE_JSON="$RELEASE_JSON" python3 -c 'import json,os; print(json.loads(os.environ["RELEASE_JSON"])["upload_url"].split("{")[0])')
          echo "Uploading APK asset $ASSET"
          ASSET_JSON=$(curl -sS -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" -H "Content-Type: application/vnd.android.package-archive" --data-binary @"$APK" "$UPLOAD_URL?name=$ASSET")
          APK_URL=$(ASSET_JSON="$ASSET_JSON" python3 -c 'import json,os; print(json.loads(os.environ["ASSET_JSON"]).get("browser_download_url", ""))')
          if [ -z "$APK_URL" ]; then
            echo "GitHub upload failed: $ASSET_JSON"
            exit 1
          fi
          echo "Public APK URL: $APK_URL"

          echo "Publishing update to Google Script with exact APK versionCode=$BUILD_VERSION_CODE"
          export APK_URL
          python3 - <<'PY'
          import urllib.parse, urllib.request, json, os
          base=os.environ['GOOGLE_SCRIPT_URL']
          params={
              'action':'set_app_update',
              'secret':os.environ['ADMIN_SECRET'],
              'version_code':os.environ['BUILD_VERSION_CODE'],
              'version_name':os.environ.get('BUILD_VERSION_NAME',''),
              'apk_url':os.environ['APK_URL'],
              'force_update':os.environ.get('FORCE_UPDATE','false'),
              'notes_ar':os.environ.get('NOTES_AR','تحديث جديد من LATCHI IPTV.')
          }
          url=base+'?'+urllib.parse.urlencode(params)
          body=urllib.request.urlopen(url, timeout=30).read().decode()
          print(body)
          try:
              j=json.loads(body)
              assert j.get('success') is True
          except Exception:
              raise SystemExit('Google Script update publish failed')
          PY

    artifacts:
      - artifacts/*.apk
      - app/build/outputs/**/*.apk
