workflows:
  android-debug-build-from-zip:
    name: Android Debug APK From ZIP + Auto GitHub Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      # IMPORTANT: In Codemagic UI, add Environment Variable:
      # GITHUB_TOKEN = your classic GitHub token with "repo" scope (for Releases upload)

    scripts:
      - name: Show root files
        script: |
          pwd
          ls -la

      - name: Unzip project and detect root
        script: |
          rm -rf build_project
          mkdir -p build_project
          unzip -q IPTVmine-1.0.9.zip -d build_project
          echo "Top-level after unzip:"
          ls -la build_project
          GRADLEW_PATH="$(find build_project -maxdepth 3 -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew not found after unzip. ZIP structure is invalid."
            find build_project -maxdepth 3 -type f | head -80
            exit 1
          fi
          PROJECT_ROOT="$(dirname "$GRADLEW_PATH")"
          echo "Detected PROJECT_ROOT=$PROJECT_ROOT"
          ls -la "$PROJECT_ROOT"

      - name: Clean local machine files
        script: |
          GRADLEW_PATH="$(find build_project -maxdepth 3 -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then echo "ERROR: gradlew not found"; exit 1; fi
          PROJECT_ROOT="$(dirname "$GRADLEW_PATH")"
          cd "$PROJECT_ROOT"
          rm -f local.properties
          rm -rf .idea
          rm -rf app/release

      - name: Make Gradle executable
        script: |
          GRADLEW_PATH="$(find build_project -maxdepth 3 -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then echo "ERROR: gradlew not found"; exit 1; fi
          PROJECT_ROOT="$(dirname "$GRADLEW_PATH")"
          cd "$PROJECT_ROOT"
          chmod +x ./gradlew

      - name: Build Debug APK
        script: |
          GRADLEW_PATH="$(find build_project -maxdepth 3 -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then echo "ERROR: gradlew not found"; exit 1; fi
          PROJECT_ROOT="$(dirname "$GRADLEW_PATH")"
          cd "$PROJECT_ROOT"
          attempt=1
          max=3
          while true; do
            echo "===== Build attempt $attempt ====="
            set -o pipefail
            ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build_log.txt
            status=$?
            set +o pipefail
            if [ "$status" -eq 0 ]; then
              echo "Build succeeded"
              break
            fi
            if grep -qiE "Read timed out|Could not (GET|download)|connection reset|Network is unreachable|Could not resolve" build_log.txt \
               && ! grep -qiE "compileDebugKotlin FAILED|compileDebugJavaWithJavac FAILED|Compilation error|^e: " build_log.txt \
               && [ "$attempt" -lt "$max" ]; then
              echo "Network issue detected. Retrying in 20s..."
              attempt=$((attempt+1))
              sleep 20
              continue
            fi
            echo "Build failed due to a real error (see log above). Stopping."
            exit 1
          done

      - name: Verify APK exists
        script: |
          GRADLEW_PATH="$(find build_project -maxdepth 3 -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then echo "ERROR: gradlew not found"; exit 1; fi
          PROJECT_ROOT="$(dirname "$GRADLEW_PATH")"
          cd "$PROJECT_ROOT"
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK produced — build did not actually succeed."
            exit 1
          fi
          echo "APK found: $APK"
          # Rename to fixed name for consistent download link
          cp "$APK" "latchi-vip-latest.apk"
          echo "Created fixed-name APK: latchi-vip-latest.apk"

      - name: Upload to GitHub Releases (Automated CI/CD)
        script: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️ GITHUB_TOKEN not set in Codemagic environment variables. Skipping GitHub Release upload."
            echo "Please add GITHUB_TOKEN (classic token with 'repo' scope) in Codemagic UI."
            exit 0
          fi

          REPO="iskande233/latchi-iptv-build"
          TAG="latest"
          APK_FILE="latchi-vip-latest.apk"

          echo "Uploading $APK_FILE to GitHub Releases (tag: $TAG)..."

          # Create or update the 'latest' release
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "Creating new 'latest' release..."
            RELEASE_ID=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/releases" \
              -d '{
                "tag_name": "'$TAG'",
                "name": "Latest Build",
                "body": "Automated build from Codemagic\n\nAlways contains the newest version.",
                "draft": false,
                "prerelease": false
              }' | jq -r '.id')
          fi

          # Delete old asset with same name if exists (to keep fixed filename)
          ASSET_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID/assets" | \
            jq -r '.[] | select(.name == "'$APK_FILE'") | .id // empty')

          if [ -n "$ASSET_ID" ]; then
            echo "Deleting old asset..."
            curl -s -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID" > /dev/null
          fi

          # Upload the new APK with fixed name
          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$APK_FILE"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_FILE" \
            "$UPLOAD_URL" | jq -r '.browser_download_url // "Upload may have failed"'

          echo "✅ APK uploaded to GitHub Releases as latchi-vip-latest.apk"

    artifacts:
      - build_project/**/app/build/outputs/**/*.apk
      - latchi-vip-latest.apk
